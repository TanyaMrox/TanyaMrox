<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #010409; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #0d1117; stop-opacity: 1" />
    </linearGradient>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&amp;display=swap');
      .text-name { font: bold 32px 'Segoe UI', system-ui, sans-serif; fill: #ffffff; }
      .text-sub { font: 500 16px 'Fira Code', monospace; fill: #58a6ff; }
      .text-detail { font: 400 14px 'Segoe UI', sans-serif; fill: #8b949e; letter-spacing: 1px; }
      .ieee-tag { font: bold 12px 'Segoe UI', sans-serif; fill: #00629b; }
      .accent { fill: #238636; }
      .grid { stroke: #161b22; stroke-width: 1; }
      
      @keyframes scanline { 0% { transform: translateY(0); } 100% { transform: translateY(300px); } }
      .scan { opacity: 0.05; animation: scanline 8s linear infinite; }
    </style>
  </defs>

  <rect width="1000" height="300" fill="url(#bg-grad)" />
  
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.5" fill="#30363d" />
  </pattern>
  <rect width="1000" height="300" fill="url(#dots)" />

  <rect width="1000" height="2" fill="#58a6ff" class="scan" />

  <g transform="translate(850,40)">
    <rect x="0" y="0" width="110" height="25" rx="4" fill="#ffffff" opacity="0.1" />
    <text x="55" y="17" text-anchor="middle" class="ieee-tag" fill="#58a6ff">IEEE STUDENT</text>
  </g>

  <g transform="translate(60,130)">
    <text x="0" y="-40" class="text-sub" opacity="0.7">> root@tanya_von_rox:~/sys_eng$</text>
    
    <text x="0" y="5" class="text-name">Tanya von Rox</text>
    <text x="0" y="35" class="text-sub">Ingeniería en Sistemas</text>
    
    <g transform="translate(0,65)">
      <text x="0" y="0" class="text-detail">DIGITAL FORENSICS • CYBERSECURITY • DEV</text>
      <rect x="0" y="12" width="320" height="1" fill="#30363d" />
    </g>
  </g>

  <g transform="translate(700,150)" opacity="0.2" stroke="#58a6ff" fill="none">
    <ellipse cx="0" cy="0" rx="60" ry="20" transform="rotate(45)" />
    <ellipse cx="0" cy="0" rx="60" ry="20" transform="rotate(-45)" />
    <circle cx="0" cy="0" r="5" fill="#58a6ff" stroke="none" />
    
    <text x="80" y="-40" font-family="serif" font-style="italic" font-size="14" fill="#3fb950" stroke="none">δU = δQ - δW</text>
    <text x="80" y="60" font-family="serif" font-style="italic" font-size="14" fill="#3fb950" stroke="none">f(x) = ∫ φ(t) dt</text>
  </g>

  <g transform="translate(920,100)" opacity="0.3">
    <rect x="0" y="0" width="30" height="4" fill="#238636" />
    <rect x="0" y="10" width="50" height="4" fill="#58a6ff" />
    <rect x="0" y="20" width="20" height="4" fill="#d29922" />
  </g>
</svg>
